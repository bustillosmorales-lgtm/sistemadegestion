<!DOCTYPE html>
<html>
<head>
  <title>Limpiar SKUs "en proceso"</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 50px auto;
      padding: 20px;
    }
    button {
      background: #0070f3;
      color: white;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 5px;
      margin: 10px 5px;
      font-size: 16px;
    }
    button:hover {
      background: #0051cc;
    }
    button.danger {
      background: #e00;
    }
    button.danger:hover {
      background: #c00;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 5px;
      white-space: pre-wrap;
      font-family: monospace;
    }
    .product-list {
      margin-top: 10px;
      max-height: 400px;
      overflow-y: auto;
    }
    .product-item {
      padding: 8px;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
    }
    .status {
      display: inline-block;
      padding: 4px 8px;
      background: #ffa500;
      color: white;
      border-radius: 3px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>🧹 Limpiar SKUs con status "en proceso"</h1>

  <div>
    <button onclick="checkEnProceso()">1. Verificar SKUs en proceso</button>
    <button onclick="cleanEnProceso('NEEDS_REPLENISHMENT')" class="danger">2. Limpiar → NEEDS_REPLENISHMENT</button>
    <button onclick="cleanEnProceso('NO_REPLENISHMENT_NEEDED')">3. Limpiar → NO_REPLENISHMENT_NEEDED</button>
    <button onclick="cleanEnProceso('activo')">4. Limpiar → activo (legacy)</button>
  </div>

  <div id="result" class="result" style="display: none;"></div>

  <script>
    async function checkEnProceso() {
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = '⏳ Consultando...';

      try {
        const response = await fetch('/api/clean-en-proceso');
        const data = await response.json();

        if (data.success && data.count > 0) {
          let html = `✅ Encontrados ${data.count} SKUs con status "en proceso":\n\n`;
          html += '<div class="product-list">';
          data.products.forEach(p => {
            html += `<div class="product-item">
              <span><strong>${p.sku}</strong> - ${p.descripcion || 'Sin descripción'}</span>
              <span class="status">${p.status}</span>
            </div>`;
          });
          html += '</div>';
          resultDiv.innerHTML = html;
        } else if (data.success && data.count === 0) {
          resultDiv.innerHTML = '✅ No hay SKUs con status "en proceso"';
        } else {
          resultDiv.innerHTML = '❌ Error: ' + (data.error || 'Unknown error');
        }
      } catch (error) {
        resultDiv.innerHTML = '❌ Error: ' + error.message;
      }
    }

    async function cleanEnProceso(newStatus) {
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = `⏳ Limpiando y actualizando a "${newStatus}"...`;

      try {
        const response = await fetch('/api/clean-en-proceso', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ newStatus })
        });
        const data = await response.json();

        if (data.success) {
          let html = `✅ ${data.message}\n\n`;
          html += `📊 Total actualizados: ${data.count}\n`;
          html += `🔍 Restantes en proceso: ${data.remaining}\n\n`;

          if (data.products && data.products.length > 0) {
            html += 'SKUs actualizados:\n';
            html += '<div class="product-list">';
            data.products.forEach(p => {
              html += `<div class="product-item">
                <span><strong>${p.sku}</strong></span>
                <span class="status" style="background: #0c0;">${p.status}</span>
              </div>`;
            });
            html += '</div>';
          }

          if (data.remaining === 0) {
            html += '\n\n🎉 ¡Perfecto! No quedan SKUs en proceso.';
          }

          resultDiv.innerHTML = html;
        } else {
          resultDiv.innerHTML = '❌ Error: ' + (data.error || 'Unknown error');
        }
      } catch (error) {
        resultDiv.innerHTML = '❌ Error: ' + error.message;
      }
    }
  </script>
</body>
</html>
