<!DOCTYPE html>
<html>
<head>
  <title>Debug Dashboard Attention Count</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1400px;
      margin: 20px auto;
      padding: 20px;
    }
    button {
      background: #0070f3;
      color: white;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 5px;
      margin: 10px 5px;
      font-size: 16px;
    }
    button:hover {
      background: #0051cc;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 5px;
      font-family: monospace;
      white-space: pre-wrap;
    }
    .comparison {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    .box {
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 5px;
    }
    .box h3 {
      margin-top: 0;
    }
    .highlight {
      background: #ffeb3b;
      padding: 2px 5px;
      font-weight: bold;
    }
    .products {
      max-height: 300px;
      overflow-y: auto;
      margin-top: 10px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>🔍 Debug: "Requieren Atención" Counter</h1>

  <div>
    <button onclick="checkAll()">Comparar Dashboard vs Debug API</button>
    <button onclick="clearCache()">Limpiar Cache Dashboard</button>
  </div>

  <div id="result"></div>

  <script>
    async function checkAll() {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '⏳ Consultando ambos endpoints...';

      try {
        // Consultar dashboard stats (con nocache)
        const dashboardResponse = await fetch('/api/dashboard-stats?nocache=true');
        const dashboardData = await dashboardResponse.json();

        // Consultar debug API
        const debugResponse = await fetch('/api/debug-attention-count');
        const debugData = await debugResponse.json();

        const dashboardCount = dashboardData.stats?.summary?.needsAttention || 0;
        const debugCount = debugData.needsAttentionTotal || 0;

        let html = '<div class="comparison">';

        // Dashboard Stats
        html += '<div class="box">';
        html += '<h3>📊 Dashboard Stats API</h3>';
        html += `<p>Requieren Atención: <span class="highlight">${dashboardCount}</span></p>`;
        html += '<p>Breakdown:</p>';
        html += `<pre>${JSON.stringify(dashboardData.stats?.statusBreakdown, null, 2)}</pre>`;
        html += '</div>';

        // Debug API
        html += '<div class="box">';
        html += '<h3>🔍 Debug API (Directo)</h3>';
        html += `<p>Requieren Atención: <span class="highlight">${debugCount}</span></p>`;
        html += '<p>Breakdown:</p>';
        html += `<ul>
          <li>QUOTE_REQUESTED: ${debugData.breakdown.QUOTE_REQUESTED.count}</li>
          <li>QUOTED: ${debugData.breakdown.QUOTED.count}</li>
          <li>ANALYZING: ${debugData.breakdown.ANALYZING.count}</li>
          <li>PURCHASE_APPROVED: ${debugData.breakdown.PURCHASE_APPROVED.count}</li>
        </ul>`;
        html += '</div>';

        html += '</div>';

        // Conclusión
        if (dashboardCount !== debugCount) {
          html += `<div class="box" style="border-color: #e00; margin-top: 20px;">`;
          html += `<h3>⚠️ DISCREPANCIA DETECTADA</h3>`;
          html += `<p>Dashboard muestra <strong>${dashboardCount}</strong> pero realmente hay <strong>${debugCount}</strong></p>`;
          html += `<p>Diferencia: ${dashboardCount - debugCount} productos</p>`;
          html += `<p><strong>Posibles causas:</strong></p>`;
          html += `<ul>
            <li>Cache desactualizado</li>
            <li>Tabla 'products' vs tabla legacy diferente</li>
            <li>Lógica de cálculo diferente en dashboard-stats.js</li>
          </ul>`;
          html += '</div>';

          // Mostrar productos ANALYZING
          if (debugData.breakdown.ANALYZING.count > 0) {
            html += '<div class="box" style="margin-top: 20px;">';
            html += `<h3>📋 ${debugData.breakdown.ANALYZING.count} Productos en ANALYZING</h3>`;
            html += '<div class="products">';
            debugData.breakdown.ANALYZING.products.forEach(p => {
              html += `<div style="padding: 5px; border-bottom: 1px solid #eee;">
                <strong>${p.sku}</strong> - ${p.descripcion}
              </div>`;
            });
            html += '</div></div>';
          }
        } else {
          html += `<div class="box" style="border-color: #0c0; margin-top: 20px;">`;
          html += `<h3>✅ CONTADORES COINCIDEN</h3>`;
          html += `<p>Ambos muestran ${dashboardCount} productos que requieren atención</p>`;
          html += '</div>';
        }

        resultDiv.innerHTML = html;

      } catch (error) {
        resultDiv.innerHTML = `❌ Error: ${error.message}`;
      }
    }

    async function clearCache() {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '⏳ Limpiando cache...';

      try {
        // Forzar recarga sin cache
        await fetch('/api/dashboard-stats?nocache=true');
        resultDiv.innerHTML = '✅ Cache limpiado. Recarga el dashboard para ver los cambios.';
      } catch (error) {
        resultDiv.innerHTML = `❌ Error: ${error.message}`;
      }
    }
  </script>
</body>
</html>
